name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      strategy:
        description: Kubernetes rollout overlay
        required: true
        default: production-canary
        type: choice
        options:
          - production-canary
          - production-bluegreen
      promote_bluegreen:
        description: Promote immediately when using the blue/green overlay
        required: true
        default: false
        type: boolean

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint and production build
        env:
          VITE_FEATURE_FLAGS: ${{ vars.VITE_FEATURE_FLAGS }}
        run: |
          export VITE_FEATURE_FLAGS="${VITE_FEATURE_FLAGS:-{\"newDashboard\":true,\"launchLandingPage\":true,\"docsCallout\":true}}"
          npm run lint
          npm run build

  publish:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image reference
        id: image
        run: echo "image=${REGISTRY}/${IMAGE_NAME}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VITE_FEATURE_FLAGS=${{ vars.VITE_FEATURE_FLAGS }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ steps.image.outputs.image }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: publish
    environment: production
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Install kubectl argo-rollouts plugin
        run: |
          curl -sSL -o kubectl-argo-rollouts https://github.com/argoproj/argo-rollouts/releases/download/v1.8.3/kubectl-argo-rollouts-linux-amd64
          chmod +x kubectl-argo-rollouts
          sudo mv kubectl-argo-rollouts /usr/local/bin/kubectl-argo-rollouts

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_B64 }}" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Resolve deploy settings
        id: settings
        shell: bash
        run: |
          OVERLAY="production-canary"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${{ inputs.strategy }}" ]]; then
            OVERLAY="${{ inputs.strategy }}"
          fi

          NAMESPACE="${{ vars.K8S_NAMESPACE }}"
          if [[ -z "$NAMESPACE" ]]; then
            NAMESPACE="backforge"
          fi

          PROMOTE="false"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${{ inputs.promote_bluegreen }}" == "true" ]]; then
            PROMOTE="true"
          fi

          echo "overlay=$OVERLAY" >> "$GITHUB_OUTPUT"
          echo "namespace=$NAMESPACE" >> "$GITHUB_OUTPUT"
          echo "promote=$PROMOTE" >> "$GITHUB_OUTPUT"

      - name: Apply Kubernetes manifests
        run: kubectl apply -k k8s/overlays/${{ steps.settings.outputs.overlay }}

      - name: Update runtime images
        run: |
          kubectl argo rollouts set image backforge-api api=${{ needs.publish.outputs.image }} -n ${{ steps.settings.outputs.namespace }}
          kubectl -n ${{ steps.settings.outputs.namespace }} set image deployment/backforge-worker worker=${{ needs.publish.outputs.image }}

      - name: Wait for worker deployment
        run: kubectl rollout status deployment/backforge-worker -n ${{ steps.settings.outputs.namespace }} --timeout=5m

      - name: Wait for canary rollout
        if: ${{ steps.settings.outputs.overlay == 'production-canary' }}
        run: kubectl argo rollouts status backforge-api -n ${{ steps.settings.outputs.namespace }} --timeout 10m

      - name: Promote blue/green rollout
        if: ${{ steps.settings.outputs.overlay == 'production-bluegreen' && steps.settings.outputs.promote == 'true' }}
        run: |
          kubectl argo rollouts promote backforge-api -n ${{ steps.settings.outputs.namespace }}
          kubectl argo rollouts status backforge-api -n ${{ steps.settings.outputs.namespace }} --timeout 10m

      - name: Leave blue/green rollout in preview
        if: ${{ steps.settings.outputs.overlay == 'production-bluegreen' && steps.settings.outputs.promote != 'true' }}
        run: kubectl argo rollouts get rollout backforge-api -n ${{ steps.settings.outputs.namespace }}
